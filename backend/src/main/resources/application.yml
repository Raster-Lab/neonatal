spring:
  application:
    name: nicu-system
  datasource:
    url: jdbc:h2:mem:nicudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  security:
    user:
      name: admin
      password: admin

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  version: 1.0.0
  cors:
    allowed-origins: http://localhost:4200
