# CI Pipeline — NICU Management System
#
# Runs on every push to main/develop and on pull requests targeting those branches.
# Implements the full CI pipeline as defined in .github/copilot-instructions.md:
#   1. Build         — mvn clean verify (Java) + ng build (Angular)
#   2. Unit Tests    — JUnit 5 (Java) + Jasmine/Karma (Angular)
#   3. Code Coverage — 100% enforced (JaCoCo + Istanbul)
#   4. Linting       — Checkstyle (Java) + ESLint/Prettier (Angular)
#   5. Integration   — Spring Boot Test + Testcontainers
#   6. E2E Tests     — Cypress
#
# Expected project layout:
#   backend/   — Java 21 + Spring Boot 3.x multi-module Maven project
#   frontend/  — Angular 17+ workspace

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Build, Lint, Unit Test, Code Coverage (100%)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nicu_test
          POSTGRES_USER: nicu
          POSTGRES_PASSWORD: nicu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and verify with Maven
        run: mvn clean verify -B -V
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nicu_test
          SPRING_DATASOURCE_USERNAME: nicu
          SPRING_DATASOURCE_PASSWORD: nicu_test

      - name: Run Checkstyle
        run: mvn checkstyle:check -B

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/**/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/target/surefire-reports/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Frontend — Install, Lint, Unit Test, Code Coverage (100%), Build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npx ng lint

      - name: Unit tests with coverage
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadless

      - name: Production build
        run: npx ng build --configuration=production

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Integration Tests — Spring Boot Test + Testcontainers
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run integration tests with Testcontainers
        run: mvn verify -P integration-test -B

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/**/target/failsafe-reports/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # E2E Tests — Cypress
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nicu_test
          POSTGRES_USER: nicu
          POSTGRES_PASSWORD: nicu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: mvn spring-boot:run &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nicu_test
          SPRING_DATASOURCE_USERNAME: nicu
          SPRING_DATASOURCE_PASSWORD: nicu_test

      - name: Wait for backend
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 5; done'

      - name: Run Cypress E2E tests
        run: npx cypress run

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: frontend/cypress/videos/
          retention-days: 14
