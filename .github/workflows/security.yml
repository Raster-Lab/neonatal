# Security Scanning — NICU Management System
#
# Runs CodeQL static analysis and OWASP Dependency Check on every push
# to main/develop, on pull requests, and on a weekly schedule.
#
# Implements security requirements from .github/copilot-instructions.md:
#   - OWASP Dependency Check for known vulnerabilities in dependencies
#   - CodeQL for static analysis of Java and TypeScript/JavaScript code
#
# Expected project layout:
#   backend/   — Java 21 + Spring Boot 3.x multi-module Maven project
#   frontend/  — Angular 17+ workspace

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL — Static Analysis (Java + TypeScript)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # ---------------------------------------------------------------------------
  # OWASP Dependency Check — Backend (Maven)
  # ---------------------------------------------------------------------------
  owasp-backend:
    name: OWASP Dependency Check (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-backend-report
          path: backend/**/target/dependency-check-report.html
          retention-days: 14

  # ---------------------------------------------------------------------------
  # npm audit — Frontend
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm Audit (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
